# amazinghand_bringup/config/left_hand.yaml
# Controller manager and controller parameters for the left hand.
# Hardware interface parameters (hand_name, serial_port, baud_rate, servo limits,
# and finger configs) are declared in hand.urdf.xacro as ros2_control param tags.
# This file is only read by the controller_manager and amazinghand_controller nodes.

controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    amazinghand_controller:
      type: amazinghand_controller/AmazingHandController

amazinghand_controller:
  ros__parameters:
    hand_name: "left_hand"
    finger_names:
      - "index"
      - "middle"
      - "ring"
      - "thumb"
    flexion_limit_rad:
      min: -1.5708
      max: 1.5708
    abduction_limit_rad:
      min: -0.5236
      max: 0.5236
    publish_joint_states: true
    joint_state_publish_rate_hz: 50.0

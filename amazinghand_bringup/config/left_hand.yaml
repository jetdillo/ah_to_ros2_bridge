# AmazingHand ROS2 Controller Configuration — LEFT HAND
# ---------------------------------------------------------------------------
# Structurally identical to right_hand.yaml.
# The only differences are:
#   - hand_name
#   - chirality: "left" on each finger (flips abduction sign in the mixer)
#   - leader_id / follower_id values (different servo bus IDs per pollen convention)
#   - serial_port (if on a separate bus)
# ---------------------------------------------------------------------------

amazinghand_hardware:
  ros__parameters:
    hand_name: "left_hand"
    serial_port: "/dev/ttyUSB1"
    baud_rate: 1000000
    update_rate_hz: 50.0

    servo_min_pos: 200
    servo_max_pos: 824

    fingers:
      - id: 0
        name: "index"
        chirality: "left"
        leader_id: 11
        follower_id: 12

      - id: 1
        name: "middle"
        chirality: "left"
        leader_id: 13
        follower_id: 14

      - id: 2
        name: "ring"
        chirality: "left"
        leader_id: 15
        follower_id: 16

      - id: 3
        name: "thumb"
        chirality: "left"
        leader_id: 17
        follower_id: 18

amazinghand_controller:
  ros__parameters:
    command_joints:
      - "left_hand_index_flexion"
      - "left_hand_index_abduction"
      - "left_hand_middle_flexion"
      - "left_hand_middle_abduction"
      - "left_hand_ring_flexion"
      - "left_hand_ring_abduction"
      - "left_hand_thumb_flexion"
      - "left_hand_thumb_abduction"

    flexion_limit_rad:
      min: -1.5708
      max:  1.5708

    abduction_limit_rad:
      min: -0.5236
      max:  0.5236

    publish_joint_states: true
    joint_state_publish_rate_hz: 50.0
